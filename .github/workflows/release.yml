name: release

# Cut a release by pushing a v* tag (or creating a GitHub Release, which creates
# the tag). See RELEASING.md.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release and upload the jar

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # empty when the secrets aren't configured -> the Clojars step is skipped
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Build jar
        run: clojure -T:build jar

      - name: Publish GitHub Release (with jar artifact)
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.jar
          generate_release_notes: true

      - name: Publish to Clojars
        if: env.CLOJARS_USERNAME != ''
        run: clojure -X:deploy
