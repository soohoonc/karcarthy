name: release

# Cut a release one of three ways:
#   * push a v* tag,
#   * push a release/** branch (cuts the version below; useful when tag pushes
#     are unavailable - the Release + tag are created server-side via the API),
#   * run manually (workflow_dispatch) with a version input.
# See RELEASING.md.
on:
  push:
    tags: ["v*"]
    branches: ["release/**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v0.2.0"
        default: "v0.2.0"

permissions:
  contents: write   # create the tag, the GitHub Release, and upload the jar

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # empty when the secrets aren't configured -> the Clojars step is skipped
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Build jar
        run: clojure -T:build jar

      - name: Determine release tag
        id: rel
        run: |
          TAG="${{ github.event.inputs.version }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then TAG="${{ github.ref_name }}"; fi
          if [ -z "$TAG" ]; then TAG="v0.2.0"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release (creates the tag + attaches the jar)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: target/*.jar
          generate_release_notes: true

      - name: Publish to Clojars
        if: env.CLOJARS_USERNAME != ''
        run: clojure -X:deploy
